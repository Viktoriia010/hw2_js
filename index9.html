<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сучасна HTML форма</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1e293b, #0f172a);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
        color: white;
      }

      .form-card {
        width: 100%;
        max-width: 700px;
        background: #111827;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      }

      .form-card h1 {
        margin-bottom: 10px;
        font-size: 32px;
      }

      .form-card p {
        color: #94a3b8;
        margin-bottom: 30px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .full {
        grid-column: 1 / -1;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-size: 14px;
        color: #cbd5e1;
      }

      input,
      textarea,
      select {
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #1e293b;
        color: white;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus,
      select:focus {
        box-shadow: 0 0 0 3px #3b82f6;
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      .radio-group,
      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 5px;
      }

      .radio-group label,
      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #1e293b;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
      }

      .range-value {
        margin-top: 10px;
        color: #38bdf8;
        font-weight: bold;
      }

      .buttons {
        display: flex;
        gap: 15px;
        margin-top: 25px;
      }
      .error {
        border: 2px solid red;
      }

      button {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .submit-btn {
        background: #2563eb;
        color: white;
      }

      .submit-btn:hover {
        background: #1d4ed8;
      }

      .reset-btn {
        background: #334155;
        color: white;
      }

      .reset-btn:hover {
        background: #475569;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <link rel="stylesheet" href="./styles/white-theme.css" />
    <script defer src="./scripts/hw9.js"></script>
  </head>
  <body>
    <form id="formcard">
      <p id="message"></p>
      <h1>Реєстраційна форма</h1>
      <p>Приклад сучасної HTML форми з різними елементами</p>

      <div class="grid">
        <div class="field">
          <label>Ім'я</label>
          <input type="text" name="name" placeholder="Введіть ім'я" />
        </div>

        <div class="field">
          <label>Прізвище</label>
          <input type="text" name="surname" placeholder="Введіть прізвище" />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="example@gmail.com" />
        </div>

        <div class="field">
          <label>Пароль</label>
          <input type="password" name="pwd" placeholder="********" />
        </div>

        <div class="field">
          <label>Дата народження</label>
          <input type="date" name="date" />
        </div>

        <div class="field">
          <label>Телефон</label>
          <input type="tel" name="phone" placeholder="+380..." />
        </div>

        <div class="field full">
          <label>Країна</label>
          <select name="country" id="mySelect">
            <option value="uk">Україна</option>
            <option value="pl">Польща</option>
            <option value="ge">Німеччина</option>
            <option value="usa">США</option>
          </select>
        </div>

        <div class="field full">
          <label>Стать</label>

          <div class="radio-group">
            <label>
              <input type="radio" checked name="gender" value="m" />
              <span>Чоловік</span>
            </label>

            <label>
              <input type="radio" name="gender" value="w" />
              <span>Жінка</span>
            </label>
          </div>
        </div>

        <div class="field full">
          <label>Ваші навички</label>

          <div class="checkbox-group">
            <label>
              <input type="checkbox" checked />
              HTML
            </label>

            <label>
              <input type="checkbox" />
              CSS
            </label>

            <label>
              <input type="checkbox" />
              JavaScript
            </label>

            <label>
              <input type="checkbox" />
              Python
            </label>
          </div>
        </div>

        <div class="field full">
          <label>Рівень досвіду</label>

          <input
            type="range"
            min="0"
            max="100"
            value="50"
            id="range"
            oninput="valueText.innerText = this.value + '%'"
          />

          <div class="range-value" id="valueText">50%</div>
        </div>

        <div class="field full">
          <label>Завантажити файл</label>
          <input type="file" />
        </div>

        <div class="field full">
          <label>Коментар</label>
          <textarea id="coment" placeholder="Напишіть щось..."></textarea>
        </div>

        <div class="field full">
          <label>
            <input type="checkbox" name="agree" id="checkBox" />
            <span id="checkBoxContent">Я погоджуюсь з умовами</span>
          </label>
        </div>
      </div>

      <div class="buttons">
        <button type="submit" class="submit-btn">Відправити</button>

        <button type="reset" class="reset-btn">Очистити</button>
      </div>
    </form>
